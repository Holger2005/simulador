<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito Empresarial</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="simulador.js"></script>
    <script src="funciones.js"></script>
</head>
<body>

    <main class="wrapper">
        <div class="container">
            <!-- Encabezado con Logo y Título -->
            <header class="brand-header">
                <img src="imagen.png" alt="Logo de la Empresa" class="logo" id="imgLogo">
                <h1 id="mainTitle">Simulador de Crédito</h1>
                <p class="subtitle">Evaluación y cálculo financiero instantáneo</p>
            </header>

            <form onsubmit="event.preventDefault();" class="simulator-form">
                <!-- Sección 1: Datos Financieros -->
                <section class="card-section">
                    <div class="section-header">
                        <h2>Datos financieros</h2>
                    </div>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="txtIngresos">Ingresos mensuales</label>
                            <div class="input-wrapper">
                                <span class="currency-symbol">$</span>
                                <input type="text" id="txtIngresos" placeholder="0.00">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="txtEgresos">Egresos mensuales</label>
                            <div class="input-wrapper">
                                <span class="currency-symbol">$</span>
                                <input type="text" id="txtEgresos" placeholder="0.00">
                            </div>
                        </div>
                    </div>

                    <div class="results-panel summary-panel">
                        <div class="result-row">
                            <span class="label-text">Disponible:</span>
                            <span id="spnDisponible" class="value-text">$0.00</span>
                        </div>
                        <div class="result-row">
                            <span class="label-text">Capacidad de pago mensual:</span>
                            <span id="spnCapacidadPago" class="value-text highlight">$0.00</span>
                        </div>
                    </div>
                </section>

                <!-- Sección 2: Solicitud de Crédito -->
                <section class="card-section">
                    <div class="section-header">
                        <h2>Solicitud de crédito</h2>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="txtMonto">Monto solicitado</label>
                            <div class="input-wrapper">
                                <span class="currency-symbol">$</span>
                                <input type="text" id="txtMonto" placeholder="0.00">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="txtPlazo">Plazo en años</label>
                            <input type="text" id="txtPlazo" placeholder="Ej. 3">
                        </div>

                        <div class="form-group full-width">
                            <label for="txtTasaInteres">Tasa de interés anual (%)</label>
                            <input type="text" id="txtTasaInteres" placeholder="Ej. 12.5">
                        </div>
                    </div>

                    <div class="results-panel detailed-panel">
                        <div class="result-row">
                            <span class="label-text">Interés a pagar:</span>
                            <span id="spnInteresPagar" class="value-text">$0.00</span>
                        </div>
                        <div class="result-row">
                            <span class="label-text">Total préstamo:</span>
                            <span id="spnTotalPrestamo" class="value-text">$0.00</span>
                        </div>
                        <div class="result-row main-metric">
                            <span class="label-text">Cuota mensual estimada:</span>
                            <span id="spnCuotaMensual" class="value-text primary-metric">$0.00</span>
                        </div>
                        <div class="status-row">
                            <span class="status-label">Estado de crédito:</span>
                            <span id="spnEstadoCredito" class="status-badge">ANALIZANDO...</span>
                        </div>
                    </div>
                </section>

                <!-- Acciones -->
                <div class="buttons">
                    <button type="button" id="btnCalcularCredito" class="btn btn-primary" onclick="calcular()">Calcular Crédito</button>
                    <button type="button" id="btnReiniciar" class="btn btn-secondary" onclick="reiniciar()">Reiniciar</button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
